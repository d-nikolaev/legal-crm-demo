version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=legal_db
      - POSTGRES_USER=legal_user
      - POSTGRES_PASSWORD=legal_pass

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgres://legal_user:legal_pass@db:5432/legal_db
      - DEBUG=True
      - SECRET_KEY=demo_secret_key
    depends_on:
      - db

volumes:
  postgres_data: